# Pre-commit hooks for amplihack-xpia-defender
# Install: pip install pre-commit && pre-commit install
# Run all: pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --features cli -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-test
        name: cargo test (fast)
        entry: cargo test --lib --test adversarial --test outside_in --test golden_tests --features cli
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-commit]
